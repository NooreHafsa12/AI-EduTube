<section class="video-card-section">
    <div class="glass-card video-input-card">
        <h2>Paste Your YouTube Video URL</h2>
        <p>AI StudyMate will convert it into complete study material.</p>

        <form id="videoForm">
            <div class="input-group">
                <input
                    type="url"
                    id="videoUrl"
                    placeholder="https://www.youtube.com/watch?v=..."
                    required
                >
                <button type="submit" id="generateSummaryBtn" class="btn-primary">
                    Generate Summary
                </button>
            </div>
        </form>
    </div>
</section>
