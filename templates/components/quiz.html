<section class="quiz-section">
    <div class="section-header">
        <span class="badge">Practice Test</span>
        <h2>AI Quiz Generator</h2>
        <p>Test your understanding with automatically generated MCQs.</p>
    </div>

    <div class="action-center">
        <button id="generateQuizBtn" class="btn-secondary">
            Generate Quiz
        </button>
    </div>

    <div id="quizContainer" class="quiz-container">
        <div class="empty-state">
            <h3>No quiz yet</h3>
            <p>Generate a quiz after entering a video URL.</p>
        </div>
    </div>

    <div class="action-center">
        <button id="submitQuizBtn" class="btn-primary" style="display:none;">
            Submit Quiz
        </button>
    </div>

    <div id="quizResult"></div>
</section>
